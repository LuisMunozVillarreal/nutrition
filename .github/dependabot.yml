version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend/"
    schedule:
      interval: "weekly"
    groups:
      development-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"

  - package-ecosystem: "docker"
    directory: "/backend/docker/"
    schedule:
      interval: "weekly"
    groups:
      updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/webapp/"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/webapp/docker/"
    schedule:
      interval: "weekly"
    groups:
      updates:
        patterns:
          - "*"
