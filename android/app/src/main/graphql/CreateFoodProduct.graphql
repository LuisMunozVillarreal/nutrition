mutation CreateFoodProduct(
  $barcode: String!
) {
  createFoodProduct(
    barcode: $barcode,
  ) {
    foodProduct {
      id
      brand
      name
      url
      barcode
      energy
      weight
      weightUnit
      numServings
      proteinG
      fatG
      saturatedFatG
      polyunsaturatedFatG
      monosaturatedFatG
      transFatG
      carbsG
      fiberCarbsG
      sugarCarbsG
      sodiumMg
      potassiumMg
      vitaminAPerc
      vitaminCPerc
      calciumPerc
      ironPerc
    }
    state
  }
}
